<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

    <style>

        body{

            background-image: url('/bg.jpg');

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            background-attachment: fixed;

            min-height: 100vh;
        }

        .container{

            background: transparent !important;
        }

        h2{

            color: white;

            font-weight: bold;

            text-shadow: 2px 2px 10px black;
        }

        .table{

            background-color: rgba(255,255,255,0.88);
        }

        .table th,
        .table td{

            border: none !important;
        }

        /* DARK MODE */

        .dark-mode{

            background-color: #121212 !important;

            background-image: none !important;

            color: white !important;
        }

        

        .dark-mode .thead-dark th{

            background-color: black !important;
        }

        .dark-mode .navbar{

            background-color: black !important;
        }

        .dark-mode h2{

            color: white;
        }

    </style>

    <title>Student Table</title>

</head>

<body>

    <nav class="navbar navbar-expand-md bg-dark navbar-dark">

        <!-- Brand -->

        <a class="navbar-brand" href="#">
            Student Management System
        </a>

        <!-- Navbar Links -->

        <div class="collapse navbar-collapse" id="collapsibleNavbar">

            <ul class="navbar-nav">

                <a class="nav-link" th:href="@{/home}">
                    Home
                </a>

                <li class="nav-item">

                    <a class="nav-link" th:href="@{/students}">
                        Student Management
                    </a>

                </li>

            </ul>

            <!-- DARK -->

            <button class="nav-link border-0 bg-transparent text-white"
                    onclick="toggleDarkMode()">

                🌙 Dark Mode

            </button>

        </div>

    </nav>

    <div class="container">

        <div class="text-center mt-4 mb-4">

            <h2>Student List</h2>

        </div>

        <div class="row">

            <div class="col-lg-3">

                <a th:href="@{students/new}"
                   class="btn btn-primary btn-sm mb-3">

                    Add Student

                </a>

            </div>

        </div>
        <h4 class="text-white mb-3">

    Total Students :
    <span th:text="${#lists.size(students)}"></span>

</h4>

        <table class="table table-striped table-bordered">

            <thead class="thead-dark">

                <tr>

                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th colspan="2" class="text-center">Action</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="student : ${students}">

                    <td th:text="${student.id}"></td>
                    <td th:text="${student.firstName}"></td>
                    <td th:text="${student.lastName}"></td>
                    <td th:text="${student.email}"></td>

                    <td>

                        <a th:href="@{students/edit/{id}(id=${student.id})}"
                           class="btn btn-warning">

                            Update

                        </a>

                    </td>

                    <td>

                        <a th:href="@{students/delete/{id}(id=${student.id})}"
                           class="btn btn-danger"
                           onclick="return confirm('Are you sure you want to delete this student?')">

                            Delete

                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- DARK MODE  -->

    <script>

        function toggleDarkMode(){

            document.body.classList.toggle("dark-mode");
        }

    </script>

</body>

</html>
